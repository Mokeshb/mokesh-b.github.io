<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Projects</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0b0f19;
            --panel: #131a2c;
            --border: #222f4d;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        section { margin-bottom: 3.5rem; }

        .section-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Projects Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
        }

        .project-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .project-card:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .proj-name { font-size: 1.15rem; font-weight: 600; color: #fff; margin-bottom: 0.3rem; }
        .proj-tech { font-family: var(--font-mono); font-size: 0.8rem; color: var(--accent); margin-bottom: 0.75rem; }
        .proj-desc { color: var(--text-dim); font-size: 0.9rem; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">

    <!-- Academic Projects Layout Section -->
    <section id="projects">
        <h2 class="section-title">// ACADEMIC PROJECTS</h2>
        <div class="projects-grid" id="projectsGrid"></div>
    </section>

</div>

<script>
    const projectData = [
        {
            name: "Fake Product Review Monitoring System",
            tech: "NLP • Anomaly Detection • 48-hour build",
            desc: "Engineered and deployed a system that reduced fake reviews by 40% and bolstered customer trust."
        },
        {
            name: "Hybrid CatBoost Stock Prediction Model",
            tech: "Gradient Boosting • Categorical Data",
            desc: "Improved stock prediction accuracy by 92.99%, adapting to market volatility via efficient categorical processing."
        },
        {
            name: "Credit Card Fraud Detection",
            tech: "XGBoost • Advanced Analytics",
            desc: "Building a fraud detection system aimed at improving transaction security and prevention accuracy."
        },
        {
            name: "Outlier Detection - Isolation Forest & LOF",
            tech: "Univariate & Multivariate Analysis",
            desc: "A consistent, robust analytical approach to outlier detection across single- and multi-variable datasets."
        },
        {
            name: "CNN Image Classification",
            tech: "TensorFlow",
            desc: "Built a convolutional neural network pipeline - convolutional, pooling, and fully connected layers for effective image classification."
        },
        {
            name: "Deep Learning Chatbot",
            tech: "NLP",
            desc: "Developed a chatbot using deep learning for more natural, contextually relevant conversation."
        },
        {
            name: "Drug Recommendation System",
            tech: "NLP • Machine Learning",
            desc: "Built a recommendation tool that analyzes patient reviews and conditions to suggest suitable medications, applying NLP and similarity-based filtering techniques."
        },
        {
            name: "ETL Pipeline",
            tech: "Data Engineering",
            desc: "Designed and implemented an ETL pipeline to extract, transform, and load data from multiple sources into a structured data store, automating recurring data processing workflows."
        },
        {
            name: "Library Management System (MERN)",
            tech: "MongoDB • Express • React • Node.js",
            desc: "Built a full-stack library management system supporting book cataloging, member management, and borrowing/return tracking."
        },
        {
            name: "AI Orders & Kitchen System",
            tech: "AI / Full-Stack",
            desc: "Developed an AI-assisted order and kitchen management system that automates order intake and routing to streamline restaurant kitchen operations."
        }
    ];

    // Inject the clean static cards directly into the document grid layout
    const grid = document.getElementById('projectsGrid');
    projectData.forEach((p) => {
        const card = document.createElement('div');
        card.className = 'project-card';
        card.innerHTML = `
            <div>
                <div class="proj-name">\${p.name}</div>
                <div class="proj-tech">\${p.tech}</div>
                <div class="proj-desc">\${p.desc}</div>
            </div>
        `;
        grid.appendChild(card);
    });
</script>

</body>
</html>
